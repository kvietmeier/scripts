<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure Money Laundering Detection</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { border-bottom: 2px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-box { margin-top: 20px; padding: 30px; text-align: center; border: 2px solid #30363d; border-radius: 8px; transition: all 0.3s ease; }
        .SECURE { background-color: #0f2d18; border-color: #2ea043; color: #2ea043; }
        .CRITICAL { background-color: #380e0e; border-color: #ff5555; color: #ff5555; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 85, 85, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 85, 85, 0); } }
        .metrics { display: flex; gap: 20px; margin-top: 20px; }
        .card { flex: 1; background: #161b22; padding: 20px; border: 1px solid #30363d; border-radius: 6px; }
        .card p { margin: 5px 0 0; font-size: 28px; font-weight: bold; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; border-bottom: 1px solid #30363d; padding: 10px; color: #8b949e; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        .red-flag { color: #ff7b72; font-weight: bold; }
        .clean { color: #7ee787; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 24px; font-weight: bold; color: #58a6ff;">🛡️ VAST GLOBAL MONITORING</div>
        <div id="sync-indicator" style="font-size: 12px; color: #2ea043;">● SYNCING</div>
    </div>

    <div id="status-display" class="status-box SECURE">
        <h1 id="status-text">SYSTEM SECURE</h1>
        <div style="font-size: 14px; opacity: 0.8;">SCANNING 5s TURBO WINDOW...</div>
    </div>

    <div class="metrics">
        <div class="card"><h3>TOTAL VOLUME (5s)</h3><p id="vol-metric">$0</p></div>
        <div class="card"><h3>ACTIVE ALERTS</h3><p id="alert-metric" style="color: #ff7b72;">0</p></div>
    </div>

    <h3 style="margin-top: 30px; border-bottom: 1px solid #30363d;">🚨 PRIORITY ALERTS</h3>
    <table id="alert-table">
        <thead><tr><th>TIME</th><th>AMOUNT</th><th>ORIGIN</th><th>STATUS</th></tr></thead>
        <tbody></tbody>
    </table>

    <h3 style="margin-top: 30px; border-bottom: 1px solid #30363d;">📡 LIVE FEED</h3>
    <table id="feed-table">
        <thead><tr><th>TIME</th><th>ID</th><th>AMOUNT</th><th>STATUS</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    function updateDashboard() {
        // Blink indicator to show the refresh is happening
        const indicator = document.getElementById('sync-indicator');
        indicator.style.opacity = "1";

        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                // Update Numeric Stats
                document.getElementById('vol-metric').innerText = data.volume;
                document.getElementById('alert-metric').innerText = data.alert_count;

                // Update Status Box
                const statusBox = document.getElementById('status-display');
                const statusText = document.getElementById('status-text');
                statusBox.className = 'status-box ' + data.status;
                statusText.innerText = data.status === 'CRITICAL' ? '⚠️ MONEY LAUNDERING DETECTED' : 'SYSTEM SECURE';

                // Update Alerts Table
                const alertBody = document.querySelector('#alert-table tbody');
                alertBody.innerHTML = (data.alerts || []).map(tx => `
                    <tr style="background: rgba(255,0,0,0.1);">
                        <td>${tx.time || 'N/A'}</td>
                        <td>$${(tx.amount || 0).toLocaleString()}</td>
                        <td>${tx.country || 'Unknown'}</td>
                        <td class="red-flag">DETECTED</td>
                    </tr>
                `).join('');

                // Update Feed Table
                const feedBody = document.querySelector('#feed-table tbody');
                feedBody.innerHTML = (data.recent_tx || []).map(tx => `
                    <tr>
                        <td>${tx.time || 'N/A'}</td>
                        <td>${tx.id || '---'}</td>
                        <td>$${(tx.amount || 0).toLocaleString()}</td>
                        <td class="${tx.status === 'RED_FLAG' ? 'red-flag' : 'clean'}">${tx.status}</td>
                    </tr>
                `).join('');

                setTimeout(() => { indicator.style.opacity = "0.3"; }, 200);
            })
            .catch(err => console.error("API Error:", err));
    }

    // Refresh every 1 second
    setInterval(updateDashboard, 1000);
    updateDashboard(); // Initial call
</script>
</body>
</html>
